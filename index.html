.cb:hover{border-color:var(--acc);}
.cb.done{background:var(--acc);border-color:var(--acc);}
.chev{color:var(--muted);font-size:.65rem;transition:transform .2s;flex-shrink:0;}
.chev.op{transform:rotate(90deg);}
.db{display:none;padding:0 14px 14px;border-top:1px solid var(--border);}
.db.op{display:block;}
.bl{margin-top:12px;}
.blt{font-family:monospace;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:7px;}
.blt::after{content:'';flex:1;height:1px;background:var(--border);}
.tb{font-size:.62rem;background:var(--surface2);border:1px solid var(--border);padding:1px 6px;border-radius:3px;color:var(--acc2);font-family:monospace;}
/* WORD TABLE */
.wt{width:100%;border-collapse:collapse;font-size:.79rem;}
.wt td{padding:4px 7px;border-bottom:1px solid var(--border);vertical-align:top;}
.wt tr:last-child td{border-bottom:none;}
.wt .nl{font-family:monospace;color:var(--acc2);font-weight:600;width:40%;}
.wt .tr{color:var(--muted);width:30%;}
.wt .ex{color:var(--text);font-size:.73rem;font-style:italic;}
.wt tr:hover td{background:var(--surface2);}
.wt .cat{background:var(--surface2);color:var(--acc);font-family:monospace;font-size:.58rem;letter-spacing:1px;text-transform:uppercase;padding:5px 7px;}
.wt .cat td{border-bottom:1px solid var(--border);}

.pl{list-style:none;}

// RENDER ENGINE
const EXAM = new Date('2026-06-24T09:00:00');
function upCD(){
  const d=EXAM-new Date();
  if(d<=0){document.getElementById('cd').textContent='[*] SINAV GÜNÜ!';return;}
  const days=Math.floor(d/86400000),hrs=Math.floor((d%86400000)/3600000);
  document.getElementById('cd').textContent=`SINAVA ${days}G ${hrs}S`;
}
var _mem=[];
function getD(){try{return JSON.parse(localStorage.getItem('nt2v2')||'[]');}catch(e){return _mem.slice();}}
function saveD(a){_mem=a.slice();try{localStorage.setItem('nt2v2',JSON.stringify(a));}catch(e){}}
function upProg(){
  const d=getD();
  document.getElementById('pf').style.width=Math.round(d.length/DAYS.length*100)+'%';
}
function toggleDone(i,e){
  e.stopPropagation();
  let d=getD();const k='d'+i;
  if(d.includes(k))d=d.filter(x=>x!==k);else d.push(k);
  saveD(d);
  const card=document.querySelector('[data-i="'+i+'"]');
  const btn=card.querySelector('.cb');
  const isDone=d.includes(k);
  card.classList.toggle('done',isDone);
  btn.classList.toggle('done',isDone);
  btn.textContent=isDone?'v':'';
  upProg();
}
function tog(i){
  const b=document.querySelector('[data-b="'+i+'"]');
  const c=document.querySelector('[data-c="'+i+'"]');
  b.classList.toggle('op');c.classList.toggle('op');
}
function render(){
  const mc=document.getElementById('mc');
  const done=getD();
  let h='';
  const weeks={0:'HAFTA 1 - 22-28 Mayıs',7:'HAFTA 2 - 29 Mayıs-4 Haziran',14:'HAFTA 3 - 5-11 Haziran',19:'HAFTA 4 - 12-18 Haziran',25:'HAFTA 5 - 19-24 Haziran'};
  DAYS.forEach((day,i)=>{
    if(weeks[i])h+=`<div class="wh">${weeks[i]}</div>`;
    const isDone=done.includes('d'+i);
    const isExam=day.tag==='exam';
    const tc={d1:'td1',d2:'td2',d3:'td3',sim:'tsim',exam:'texam'}[day.tag]||'td1';
    h+=`<div class="dc ${isDone&&!isExam?'done':''} ${isExam?'today':''}" data-i="${i}">
<div class="dh" onclick="tog(${i})">
  <div class="dn">#${String(i+1).padStart(2,'0')}</div>
  <div class="dd">${day.date}</div>
  <div class="dt">${day.title}</div>
  <span class="tag ${tc}">${day.tagL}</span>
  <button class="cb ${isDone?'done':''}" onclick="toggleDone(${i},event)">${isDone?'v':''}</button>
  <span class="chev" data-c="${i}">-</span>
</div>
<div class="db" data-b="${i}">`;
    if(day.words&&day.words.length>0){
      h+=`<div class="bl"><div class="blt">KELİMELER <span class="tb">TREN GİDİŞ</span></div><table class="wt">`;
      day.words.forEach(([nl,tr,ex])=>{
        if(nl.startsWith('--')){
          h+=`<tr class="cat"><td colspan="3" class="cat">${nl.replace(/--/g,'').trim()}</td></tr>`;
        } else {
          h+=`<tr><td class="nl">${nl}</td><td class="tr">${tr}</td><td class="ex">${ex}</td></tr>`;
        }
      });
      h+=`</table></div>`;
    }
    if(day.phrases&&day.phrases.length>0){
      h+=`<div class="bl"><div class="blt">KALIPLAR <span class="tb">TREN DÖNÜŞ</span></div><ul class="pl">`;
      day.phrases.forEach(([nl,tr])=>{
        h+=`<li><strong>${nl}</strong><span>${tr}</span></li>`;
      });
      h+=`</ul></div>`;
    }
    h+=`<div class="bl"><div class="blt">ÖDEV <span class="tb">AKŞAM/GÜN</span></div>
<div class="ob"><div class="lbl">BUGÜNÜN GÖREVİ</div>${day.opdracht}</div>`;
    if(day.tip)h+=`<div class="tip">[!] ${day.tip}</div>`;
    h+=`</div></div></div>`;
  });
  mc.innerHTML=h;upProg();
}
upCD();setInterval(upCD,60000);render();
</script>
